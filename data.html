<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Live Google Sheet Data</title>
  <!-- Tabletop.js to read Google Sheets -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tabletop.js/1.6.0/tabletop.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    h2 { color: #004080; }
    table { border-collapse: collapse; width: 100%; margin-top: 20px; }
    th, td { border: 1px solid #333; padding: 8px; text-align: left; }
    th { background-color: #004080; color: white; }
    tr:nth-child(even) { background-color: #f2f2f2; }
    tr:hover { background-color: #ddd; }
  </style>
</head>
<body>

  <h2>Live Data from Google Sheet</h2>
  <div id="sheet-data">Loading data…</div>

  <script>
  window.onload = function() {

    Tabletop.init({
      // ✅ Use the classic pubhtml link with Sheet ID
      key: 'https://docs.google.com/spreadsheets/d/1NouBT8vyn3ndJMCm78qQSHI6F9KG3XIJEESw3fbtTEk/pubhtml',
      simpleSheet: true
    })
    .then(function(data) {
      if(!data || data.length === 0){
        document.getElementById('sheet-data').innerText = 'No data found in sheet.';
        return;
      }

      let html = '<table><tr>';

      // Headers
      Object.keys(data[0]).forEach(h => html += `<th>${h}</th>`);
      html += '</tr>';

      // Rows
      data.forEach(row => {
        html += '<tr>';
        Object.values(row).forEach(cell => html += `<td>${cell}</td>`);
        html += '</tr>';
      });

      html += '</table>';
      document.getElementById('sheet-data').innerHTML = html;

    })
    .catch(function(error) {
      console.error(error);
      document.getElementById('sheet-data').innerText = 'Failed to load data.';
    });

  }
  </script>

</body>
</html>
