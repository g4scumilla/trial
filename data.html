<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Live Google Sheet Data</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    h2 { color: #004080; }
    table { border-collapse: collapse; width: 100%; margin-top: 20px; }
    th, td { border: 1px solid #333; padding: 8px; text-align: left; }
    th { background-color: #004080; color: white; }
    tr:nth-child(even) { background-color: #f2f2f2; }
    tr:hover { background-color: #ddd; }
  </style>
</head>
<body>

  <h2>Live Data from Google Sheet</h2>
  <div id="sheet-data">Loading data…</div>

  <script>
  const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSJAWO9uBRGy-t7v8oHjD2Tcigwb9m7_ShR8e93iXV-APP2nfoM2oIkMJPvmt6a3p9a2l4JL6JGKfai/pub?output=csv';

  fetch(csvUrl)
    .then(response => response.text())
    .then(data => {
      const rows = data.split('\n').map(r => r.split(','));
      if(rows.length === 0) {
        document.getElementById('sheet-data').innerText = 'No data found.';
        return;
      }

      let html = '<table><tr>';
      // headers
      rows[0].forEach(h => html += `<th>${h}</th>`);
      html += '</tr>';

      // rows
      for(let i=1; i<rows.length; i++){
        html += '<tr>';
        rows[i].forEach(cell => html += `<td>${cell}</td>`);
        html += '</tr>';
      }

      html += '</table>';
      document.getElementById('sheet-data').innerHTML = html;
    })
    .catch(err => {
      console.error(err);
      document.getElementById('sheet-data').innerText = 'Failed to load data.';
    });
  </script>

</body>
</html>
